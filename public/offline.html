<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#16a34a">
  <title>Sin conexión — Mi Tienda Segura</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f9fafb;
      color: #111827;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      max-width: 360px;
      width: 100%;
      padding: 40px 32px 36px;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 14px;
      overflow: hidden;
    }
    .icon img { width: 100%; height: 100%; object-fit: cover; }
    h1 { font-size: 1.25rem; font-weight: 600; }
    p {
      margin-top: 8px;
      font-size: .875rem;
      color: #6b7280;
      line-height: 1.5;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 28px;
      padding: 10px 22px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s;
    }
    .btn:hover { background: #15803d; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <img src="/icons/icon-192.png" alt="Mi Tienda Segura" onerror="this.parentElement.style.display='none'">
    </div>
    <h1>Sin conexión a internet</h1>
    <p>
      Revisá tu conexión de red. Las ventas guardadas localmente se sincronizarán
      automáticamente cuando vuelvas a estar en línea.
    </p>
    <a href="/" class="btn">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Reintentar
    </a>
  </div>
</body>
</html>
