<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sin conexión — Mi Tienda Segura</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
    }
    .card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon svg { width: 32px; height: 32px; color: #16a34a; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: .5rem; }
    p { font-size: .875rem; color: #64748b; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #16a34a;
      color: white;
      border: none;
      border-radius: .5rem;
      padding: .625rem 1.5rem;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #15803d; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M6.343 6.343a9 9 0 000 12.728M9.172 9.172a5 5 0 000 7.072M12 12h.01"/>
      </svg>
    </div>
    <h1>Sin conexión a internet</h1>
    <p>
      Mi Tienda Segura necesita conexión para sincronizar datos.
      Revisá tu red y volvé a intentarlo.
    </p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
